services:
    traefik:
        image: traefik:v3.4
        container_name: jobscan_traefik
        command:
            - --configFile=/etc/traefik/traefik.yml
        # Ports décalés (443→8443, 8080→9080) pour coexister avec le Traefik
        # d'un autre projet Docker déjà sur les ports standards. Si 443/8080
        # sont libres, remettre "443:443"/"8080:8080" pour des URLs sans port
        # (voir README > Avec Docker).
        ports:
            - "8443:443"
            - "9080:8080"
        volumes:
            - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
            - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
            - ./certs:/certs
        networks:
            - frontend

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: jobscan_app
        working_dir: /app
        volumes:
            - ./app:/app
        environment:
            APP_ENV: dev
            DATABASE_URL: "sqlite:///%kernel.project_dir%/var/jobscan.db"
            SEARXNG_URL: http://searxng:8080
            AI_API_BASE: http://host.docker.internal:11434/v1
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            - searxng
        networks:
            - application

    nginx:
        image: nginx:alpine
        container_name: jobscan_nginx
        volumes:
            - ./app:/app
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - application

    searxng:
        image: searxng/searxng
        container_name: jobscan_searxng
        volumes:
            - ./docker/searxng/settings.yml:/etc/searxng/settings.yml
        environment:
            SEARXNG_BASE_URL: http://searxng.local
        networks:
            - frontend

networks:
    application:
    frontend:
