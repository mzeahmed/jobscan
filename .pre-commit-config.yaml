repos:
  # Vérifications de base
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: ^(docker|traefik)/
      - id: check-yaml
        args: ['--unsafe']  # Symfony/Docker Compose utilisent des tags YAML custom
      - id: check-json
#      - id: check-added-large-files
#        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Sécurité — détection de secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  # YAML — lint des fichiers de config Symfony
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint.yaml']

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.39.0
    hooks:
      - id: markdownlint
        args: ['--config', '.markdownlint.yaml', '--fix']

  # PHP et assets — hooks locaux sur les binaires Composer
  - repo: local
    hooks:
      - id: php-cs-fixer
        name: PHP CS Fixer (code style PHP)
        language: system
        entry: bash -c 'cd app && ./vendor/bin/php-cs-fixer fix --dry-run --diff'
        types: [php]
        pass_filenames: false

      - id: phpstan
        name: PHPStan (analyse statique)
        language: system
        entry: bash -c 'cd app && ./vendor/bin/phpstan analyse -c phpstan.neon --no-progress'
        types: [php]
        pass_filenames: false

      - id: assets-build
        name: Build assets (TypeScript + AssetMapper)
        language: system
        entry: bash -c 'cd app && php bin/console typescript:build && php bin/console asset-map:compile'
        files: ^app/assets/.*\.(ts|css|js)$
        pass_filenames: false
        stages: [pre-push]

      - id: phpunit
        name: PHPUnit (tests)
        language: system
        entry: bash -c 'cd app && php bin/phpunit --no-coverage'
        types: [php]
        pass_filenames: false
        stages: [pre-push]
