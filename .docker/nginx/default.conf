server {
    listen 80;

    server_name jobscan.local;

    root /app/public;
    index index.php;

    # Résolveur DNS Docker : évite un échec fatal au démarrage si "app" n'est
    # pas encore résolvable (depends_on garantit l'ordre de démarrage, pas la
    # disponibilité DNS immédiate).
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/jobscan_error.log;
    access_log /var/log/nginx/jobscan_access.log;
}
