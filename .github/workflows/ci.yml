name: Jobscan CI

on:
    pull_request:
#    push:
        branches: [ main ]

jobs:
    quality:
        name: Lint & Static Analysis
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, libxml, simplexml, sqlite3
                    coverage: none

            -   name: Install dependencies
                run: cd app && composer install --prefer-dist --no-progress --no-interaction --no-scripts

            -   name: PHP-CS-Fixer — code style
                run: cd app && ./vendor/bin/php-cs-fixer fix --dry-run --diff

            -   name: Rector — vérification uniquement (process --dry-run)
                run: cd app && ./vendor/bin/rector process --dry-run

            -   name: PHPStan — static analysis
                run: cd app && ./vendor/bin/phpstan analyse -c phpstan.neon --no-progress

    tests:
        needs: quality
        name: Tests
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v4

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.4'
                    extensions: ctype, iconv, libxml, simplexml, sqlite3
                    coverage: none

            -   name: Install dependencies
                run: cd app && composer install --prefer-dist --no-progress --no-interaction --no-scripts

            -   name: Setup environment
                run: cd app && cp .env.example .env

            -   name: PHPUnit
                run: cd app && ./vendor/bin/phpunit --no-coverage
