jobscan:
    llm:
        provider: ollama # ollama | lmstudio | gemini

        ollama:
            base_url: '%env(OLLAMA_BASE_URL)%'
            model: '%env(OLLAMA_MODEL)%'

        lmstudio:
            base_url: '%env(LMSTUDIO_BASE_URL)%'
            model: '%env(LMSTUDIO_MODEL)%'

        gemini:
            api_key: '%env(GEMINI_API_KEY)%'
            model: '%env(GEMINI_MODEL)%'

parameters:
    app.max_job_age_days: 30

    # Listes configurables via .env (valeurs séparées par des virgules) pour
    # permettre une adaptation rapide sans toucher au code ni à ce fichier.
    app.filter_keywords: '%env(csv:FILTER_KEYWORDS)%'
    app.known_stack: '%env(csv:KNOWN_STACK)%'
    app.searx_queries: '%env(csv:SEARX_QUERIES)%'
    app.job_locations: '%env(csv:JOB_LOCATIONS)%'

    app.scoring:
        prescore:
            keywords:
                php: 10
                symfony: 15
                wordpress: 10
                backend: 7
                fullstack: 7
                api: 5
            remote_keywords:
                - remote
                - télétravail
                - teletravail
            remote_bonus: 5
            negative_keywords:
                stage: -50
                alternance: -50
        compute:
            title_keywords:
                php: 20
            stack_keywords:
                symfony: 30
                wordpress: 20
            contract_bonuses:
                freelance: 15
                cdi: 10
            flag_bonuses:
                remote: 10
                recent: 20
            description_keywords:
                mission: 10
                urgent: 15
                asap: 15
            negative_keywords:
                stage: -50
                alternance: -50
            seniority_bonuses:
                senior: 15
                mid: 5
                junior: -10
            budget_bonus:
                min_daily_rate: 500
                min_annual_salary: 55
                points: 10

    app.ai_system_prompt: |
        Tu es un extracteur de données d'offres d'emploi.

        Tu dois répondre STRICTEMENT avec un JSON valide.
        Aucun texte avant.
        Aucun texte après.
        Aucun markdown.
        Aucun bloc ```json.

        Format EXACT :

        {
          "stack": ["php", "symfony", "wordpress"],
          "contract_type": "freelance|cdi|unknown",
          "freelance": true,
          "remote": true,
          "budget": "500€/j ou 45k€/an ou non précisé",
          "recent": true,
          "seniority": "junior|mid|senior|unknown"
        }

        Règles strictes :

        - "freelance" = true UNIQUEMENT si freelance, mission, TJM, contract explicite
        - "contract_type" = "cdi" UNIQUEMENT si CDI explicitement mentionné
        - "remote" = true si remote ou télétravail mentionné
        - "budget" :
          - convertir $ en € approximatif
          - exemple: $80,000 → 80k€/an
          - plage: 80k-110k€/an
        - "seniority" :
          - senior si 3+ ans ou autonomie demandée
        - "stack" :
          - uniquement technologies explicitement présentes

        Si doute → "unknown"

        Réponds UNIQUEMENT avec le JSON.
